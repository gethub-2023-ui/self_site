<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SELF — Аренда залов</title>
    <meta http-equiv="refresh" content="0;url=room-small.html">
<script>
    // Адаптация viewport: при экране < 1000px рисуем как 1440 и пропорционально уменьшаем
    (function() {
        function update() {
            var w = window.innerWidth || document.documentElement.clientWidth;
            var meta = document.querySelector('meta[name="viewport"]');
            if (!meta) {
                meta = document.createElement('meta');
                meta.setAttribute('name','viewport');
                document.head.appendChild(meta);
            }
            if (w >= 1000) {
                meta.setAttribute('content','width=device-width, initial-scale=1.0');
            } else {
                meta.setAttribute('content','width=1440, initial-scale=' + (w/1440).toFixed(3));
            }
        }
        update();
        window.addEventListener('resize', update);
    })();
    </script>
</head>
<body>
    <p>Перенаправление... <a href="room-small.html">Малый зал</a></p>
</body>
</html>
